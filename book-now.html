<!DOCTYPE html>
<html lang="en-CA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Airbnb</title>
    <meta name="robots" content="noindex, nofollow">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-70X1LQFQ5R"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-70X1LQFQ5R', { transport_type: 'beacon' });
    </script>
    <script>
        (function () {
            const airbnbUrl = 'https://www.airbnb.ca/rooms/716340250371431352';
            const destination = new URL(airbnbUrl);
            const params = new URLSearchParams(window.location.search);
            const source = params.get('source');

            destination.searchParams.set('utm_source', 'staywinnipeg.ca');
            destination.searchParams.set('utm_medium', 'redirect');
            destination.searchParams.set('utm_campaign', 'book-now');
            if (source) {
                destination.searchParams.set('sw_source', source);
            }

            const destinationUrl = destination.toString();
            let hasRedirected = false;
            const redirectToAirbnb = () => {
                if (hasRedirected) return;
                hasRedirected = true;
                window.location.replace(destinationUrl);
            };

            // Fallback in case ad blockers or network issues prevent callback execution.
            setTimeout(redirectToAirbnb, 900);

            gtag('event', 'book_now_redirect', {
                event_category: 'engagement',
                event_label: source || 'direct',
                event_callback: redirectToAirbnb
            });

            window.addEventListener('DOMContentLoaded', () => {
                const continueLink = document.getElementById('continue-link');
                if (continueLink) {
                    continueLink.href = destinationUrl;
                }
            });
        })();
    </script>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <main id="main-content">
        <p>Redirecting to Airbnb. <a id="continue-link" href="https://www.airbnb.ca/rooms/716340250371431352">Continue</a>.</p>
    </main>
</body>
</html>
