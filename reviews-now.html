<!DOCTYPE html>
<html lang="en-CA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Airbnb Reviews</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        :root {
            --mustard: #8F621B;
            --teal: #0F766E;
            --charcoal: #1F2937;
            --bg: #F8FAFC;
            --card: #ffffff;
            --border: #D5DEE8;
            --text: #111827;
            --text-light: #374151;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Manrope", "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(180deg, var(--bg) 0%, #EEF2F7 100%);
            color: var(--text);
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 1.5rem;
        }

        .skip-link {
            position: absolute;
            top: -100px;
            left: 0;
            background: #fff;
            color: #000;
            border: 2px solid var(--charcoal);
            padding: 0.75rem 1rem;
            text-decoration: none;
            z-index: 1000;
        }

        .skip-link:focus {
            top: 0;
        }

        .redirect-card {
            width: min(680px, 100%);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
            padding: 2rem;
            text-align: center;
        }

        .redirect-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--charcoal);
            margin: 0 0 0.5rem;
        }

        .redirect-subtitle {
            color: var(--text-light);
            margin: 0 0 1.25rem;
        }

        .loader {
            width: 80px;
            height: 40px;
            border-radius: 100px 100px 0 0;
            position: relative;
            overflow: hidden;
            margin: 0 auto 1rem;
        }

        .loader::before {
            content: "";
            position: absolute;
            inset: 0 0 -100%;
            background:
                radial-gradient(farthest-side, var(--mustard) 80%, #0000) left 70% top 20%/15px 15px,
                radial-gradient(farthest-side, var(--charcoal) 92%, #0000) left 65% bottom 19%/12px 12px,
                radial-gradient(farthest-side, var(--bg) 92%, #0000) left 70% bottom 20%/15px 15px,
                linear-gradient(var(--teal) 50%, var(--charcoal) 0);
            background-repeat: no-repeat;
            animation: l5 2s infinite;
        }

        .redirect-copy {
            margin: 0;
            color: var(--text);
        }

        .redirect-copy a {
            color: var(--teal);
            font-weight: 600;
        }

        @keyframes l5 {
            0%, 20% {
                transform: rotate(0);
            }
            40%, 60% {
                transform: rotate(.5turn);
            }
            80%, 100% {
                transform: rotate(1turn);
            }
        }
    </style>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-70X1LQFQ5R"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-70X1LQFQ5R', { transport_type: 'beacon' });
    </script>
    <script>
        (function () {
            const airbnbReviewsUrl = 'https://www.airbnb.ca/rooms/716340250371431352/reviews';
            const destination = new URL(airbnbReviewsUrl);
            const params = new URLSearchParams(window.location.search);
            const source = params.get('source');

            destination.searchParams.set('utm_source', 'staywinnipeg.ca');
            destination.searchParams.set('utm_medium', 'redirect');
            destination.searchParams.set('utm_campaign', 'reviews-now');
            if (source) {
                destination.searchParams.set('sw_source', source);
            }

            const destinationUrl = destination.toString();
            let hasRedirected = false;
            const redirectToAirbnb = () => {
                if (hasRedirected) return;
                hasRedirected = true;
                window.location.replace(destinationUrl);
            };

            // Fallback in case ad blockers or network issues prevent callback execution.
            setTimeout(redirectToAirbnb, 900);

            gtag('event', 'reviews_redirect', {
                event_category: 'engagement',
                event_label: source || 'direct',
                event_callback: redirectToAirbnb
            });

            window.addEventListener('DOMContentLoaded', () => {
                const continueLink = document.getElementById('continue-link');
                if (continueLink) {
                    continueLink.href = destinationUrl;
                }
            });
        })();
    </script>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <main id="main-content">
        <section class="redirect-card" aria-label="Redirect to Airbnb reviews">
            <h1 class="redirect-brand">Stay Winnipeg</h1>
            <p class="redirect-subtitle">Redirecting you to Airbnb reviews</p>
            <div class="loader" aria-hidden="true"></div>
            <p class="redirect-copy">Redirecting to Airbnb reviews. <a id="continue-link" href="https://www.airbnb.ca/rooms/716340250371431352/reviews">Continue</a>.</p>
        </section>
    </main>
</body>
</html>
